name: VINaudit
description: Vehicle history and VIN decoding REST API for accessing accident records,
  title information, mileage history, ownership records, and NHTSA recall data for
  any US vehicle. VINaudit is an NMVTIS-approved data provider offering vehicle history,
  specifications, market value, ownership cost, and vehicle image APIs.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/vinaudit/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
aid: vinaudit
type: Index

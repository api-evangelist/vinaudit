apis:
  - name: VINaudit Vehicle History API
    description: Access raw vehicle history data sourced from NMVTIS and other providers
      covering title records, odometer readings, accident records, salvage information,
      theft records, and junk/salvage brands for vehicles in the US and Canada.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.vinaudit.com/vehicle-history-api
    baseURL: https://api.vinaudit.com
    tags:
      - Vehicle History
      - NMVTIS
      - Title Records
      - Accident Records
    properties:
      - type: Documentation
        url: https://www.vinaudit.com/vehicle-history-api
      - type: OpenAPI
        url: https://www.vinaudit.com/vehicle-history-api
    contact:
      - FN: VINaudit Support
        url: https://www.vinaudit.com/vehicle-data-api
  - name: VINaudit Vehicle Specifications API
    description: Retrieve standardized vehicle specifications by VIN or year/make/model/trim
      including engine details, transmission, fuel economy, dimensions, colors, equipment,
      NHTSA recalls, warranties, and vehicle photos.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.vinaudit.com/vehicle-specifications-api
    baseURL: https://specifications.vinaudit.com
    tags:
      - Vehicle Specifications
      - VIN Decoding
      - Recall Data
      - NHTSA
    properties:
      - type: Documentation
        url: https://www.vinaudit.com/vehicle-specifications-api
    contact:
      - FN: VINaudit Support
        url: https://www.vinaudit.com/vehicle-data-api
  - name: VINaudit Vehicle Market Value API
    description: Estimate the current market value of a vehicle using aggregated data
      from millions of recent sale listings, returning low, average, and high-end
      values with a statistical certainty score.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.vinaudit.com/vehicle-market-value-api
    baseURL: https://api.vinaudit.com
    tags:
      - Market Value
      - Vehicle Pricing
      - Automotive Data
    properties:
      - type: Documentation
        url: https://www.vinaudit.com/vehicle-market-value-api
    contact:
      - FN: VINaudit Support
        url: https://www.vinaudit.com/vehicle-data-api
  - name: VINaudit Vehicle Ownership Cost API
    description: Calculate 5-year total cost of ownership by VIN, factoring in depreciation,
      insurance, fuel, maintenance, repairs, and taxes.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.vinaudit.com/vehicle-ownership-cost-api
    baseURL: https://api.vinaudit.com
    tags:
      - Ownership Cost
      - Vehicle Financing
      - Total Cost of Ownership
    properties:
      - type: Documentation
        url: https://www.vinaudit.com/vehicle-ownership-cost-api
    contact:
      - FN: VINaudit Support
        url: https://www.vinaudit.com/vehicle-data-api
  - name: VINaudit Vehicle Image API
    description: Access original stock vehicle images by make, model, year, and trim.
      Beta API providing clean, professional car images retrieved by VIN or year/make/model/trim.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.vinaudit.com/vehicle-data-api
    baseURL: https://api.vinaudit.com
    tags:
